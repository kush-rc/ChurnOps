# ==========================================================
# CD Pipeline - Build & Deploy on tag/release
# ==========================================================

name: CD Pipeline

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -f deployment/Dockerfile \
            -t churn-api:${{ steps.version.outputs.VERSION }} \
            -t churn-api:latest \
            .

      - name: Run smoke tests
        run: |
          docker run -d --name smoke-test -p 8000:8000 churn-api:latest
          sleep 10
          curl -f http://localhost:8000/health
          docker stop smoke-test

      # TODO: Push to container registry when ready
      # - name: Push to Docker Hub
      #   run: docker push yourusername/churn-api:${{ steps.version.outputs.VERSION }}
