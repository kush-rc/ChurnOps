# Logistic Regression Model Configuration (Baseline)
model:
  name: "logistic_regression"
  class: "sklearn.linear_model.LogisticRegression"

  params:
    C: 1.0
    penalty: "l2"
    solver: "lbfgs"
    max_iter: 1000
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

  tuning:
    n_trials: 20
    search_space:
      C: [0.001, 100.0]
      penalty: ["l1", "l2"]
      solver: ["saga", "liblinear"]
