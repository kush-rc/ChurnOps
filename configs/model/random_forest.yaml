# Random Forest Model Configuration (GPU Accelerated via XGBoost)
model:
  name: "random_forest"
  class: "xgboost.XGBRFClassifier"

  params:
    n_estimators: 300
    max_depth: 12
    colsample_bynode: 0.8  # Equivalent to max_features
    subsample: 0.8
    scale_pos_weight: 3  # Handle class imbalance
    tree_method: "hist"  # GPU Acceleration
    device: "cuda"       # Utilizing RTX 4060
    random_state: 42
    n_jobs: -1

  tuning:
    n_trials: 30
    search_space:
      n_estimators: [100, 500]
      max_depth: [5, 20]
      colsample_bynode: [0.5, 1.0]
      subsample: [0.5, 1.0]
