# LightGBM Model Configuration
model:
  name: "lightgbm"
  class: "lightgbm.LGBMClassifier"

  params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    reg_alpha: 0.1
    reg_lambda: 1.0
    is_unbalance: true  # Handle class imbalance
    device_type: "cpu"  # Switched to CPU to prevent OpenCL Access Violation
    verbose: -1
    random_state: 42
    n_jobs: -1

  tuning:
    n_trials: 50
    search_space:
      n_estimators: [100, 500]
      max_depth: [3, 12]
      learning_rate: [0.01, 0.3]
      num_leaves: [15, 63]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]
      min_child_samples: [5, 50]
      reg_alpha: [0.0, 1.0]
      reg_lambda: [0.5, 2.0]
