# XGBoost Model Configuration
model:
  name: "xgboost"
  class: "xgboost.XGBClassifier"

  params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    scale_pos_weight: 3  # Handle class imbalance
    eval_metric: "logloss"
    use_label_encoder: false
    tree_method: "hist"  # GPU Acceleration
    device: "cuda"       # Utilizing RTX 4060
    random_state: 42
    n_jobs: -1

  # Optuna hyperparameter search space
  tuning:
    n_trials: 50
    search_space:
      n_estimators: [100, 500]
      max_depth: [3, 10]
      learning_rate: [0.01, 0.3]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]
      min_child_weight: [1, 10]
      gamma: [0.0, 0.5]
      reg_alpha: [0.0, 1.0]
      reg_lambda: [0.5, 2.0]
