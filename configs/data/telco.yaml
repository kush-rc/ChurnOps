# Telco Customer Churn Dataset Configuration
dataset:
  name: "telco"
  filename: "telco_churn_massive.csv"
  source: "local"
  kaggle_dataset: "none"

  # Target column
  target: "Churn"
  target_positive_label: "Yes"

  # Column definitions
  id_column: "customerID"

  # Feature groups
  categorical_features:
    - "gender"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "Contract"
    - "PaperlessBilling"
    - "PaymentMethod"

  numerical_features:
    - "SeniorCitizen"
    - "tenure"
    - "MonthlyCharges"
    - "TotalCharges"

  # Preprocessing
  preprocessing:
    handle_missing: "median"  # median, mean, drop
    encode_strategy: "onehot"  # onehot, label, target
    scale_strategy: "standard"  # standard, minmax, robust
